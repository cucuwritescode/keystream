name: release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: build
        run: cargo build --release --target ${{ matrix.target }}

      - name: upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keystream-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/keystream

  release:
    name: release
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            artifacts/keystream-x86_64-apple-darwin/keystream \
            artifacts/keystream-aarch64-apple-darwin/keystream \
            -output dist/keystream
          chmod +x dist/keystream
          file dist/keystream

      - name: generate checksums
        run: |
          cd dist
          shasum -a 256 keystream > keystream.sha256
          cat keystream.sha256

      - name: create github release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: |
            dist/keystream
            dist/keystream.sha256

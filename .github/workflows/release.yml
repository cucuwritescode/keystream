name: release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  preflight:
    name: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test

  build:
    name: build-${{ matrix.target }}
    needs: preflight
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: build
        run: cargo build --release --target ${{ matrix.target }}

      - name: upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keystream-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/keystream

  release:
    name: release
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            artifacts/keystream-x86_64-apple-darwin/keystream \
            artifacts/keystream-aarch64-apple-darwin/keystream \
            -output dist/keystream
          chmod +x dist/keystream
          file dist/keystream

      - name: build pkg installer
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_ID="com.gauchodsp.keystream"
          INSTALL_DIR="/usr/local/bin"
          PLIST_DIR="/Library/LaunchAgents"

          mkdir -p pkg-root${INSTALL_DIR}
          mkdir -p pkg-root${PLIST_DIR}
          mkdir -p pkg-scripts
          mkdir -p pkg-resources

          cp dist/keystream pkg-root${INSTALL_DIR}/keystream
          chmod +x pkg-root${INSTALL_DIR}/keystream

          sed "s|__INSTALL_DIR__|${INSTALL_DIR}|g" com.gauchodsp.keystream.plist \
              > pkg-root${PLIST_DIR}/${PKG_ID}.plist

          cat > pkg-scripts/postinstall << 'POSTINSTALL'
          #!/bin/sh
          PLIST="/Library/LaunchAgents/com.gauchodsp.keystream.plist"
          CURRENT_USER=$(stat -f "%Su" /dev/console)
          if [ -n "$CURRENT_USER" ] && [ "$CURRENT_USER" != "root" ]; then
              su - "$CURRENT_USER" -c "launchctl load '$PLIST'" 2>/dev/null || true
          fi
          exit 0
          POSTINSTALL
          chmod +x pkg-scripts/postinstall

          cat > pkg-scripts/preinstall << 'PREINSTALL'
          #!/bin/sh
          PLIST="/Library/LaunchAgents/com.gauchodsp.keystream.plist"
          CURRENT_USER=$(stat -f "%Su" /dev/console)
          if [ -f "$PLIST" ] && [ -n "$CURRENT_USER" ] && [ "$CURRENT_USER" != "root" ]; then
              su - "$CURRENT_USER" -c "launchctl unload '$PLIST'" 2>/dev/null || true
          fi
          exit 0
          PREINSTALL
          chmod +x pkg-scripts/preinstall

          cp LICENSE pkg-resources/LICENSE 2>/dev/null || true

          pkgbuild \
              --root pkg-root \
              --scripts pkg-scripts \
              --identifier "$PKG_ID" \
              --version "$VERSION" \
              --install-location / \
              keystream-component.pkg

          cat > distribution.xml << DIST
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>keystream ${VERSION}</title>
              <license file="LICENSE"/>
              <options customize="never" require-scripts="false"/>
              <choices-outline><line choice="default"/></choices-outline>
              <choice id="default" title="keystream"><pkg-ref id="${PKG_ID}"/></choice>
              <pkg-ref id="${PKG_ID}" version="${VERSION}">keystream-component.pkg</pkg-ref>
          </installer-gui-script>
          DIST

          productbuild \
              --distribution distribution.xml \
              --resources pkg-resources \
              --package-path . \
              "dist/keystream-${VERSION}.pkg"

      - name: generate checksums
        run: |
          cd dist
          shasum -a 256 keystream > keystream.sha256
          for pkg in *.pkg; do
              shasum -a 256 "$pkg" > "${pkg}.sha256"
          done
          cat *.sha256

      - name: create github release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: |
            dist/keystream
            dist/keystream.sha256
            dist/*.pkg
            dist/*.pkg.sha256
